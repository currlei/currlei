name: generate animated snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: {}
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: currlei
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%23E75480&color_dots=1B1B3A,1B1B3A,E75480,E75480,E75480&color_dot_border=1B1B3A
            dist/github-contribution-grid-snake-dark.svg?color_snake=%23E75480&color_dots=1B1B3A,1B1B3A,E75480,E75480,E75480&color_dot_border=ffffff

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
